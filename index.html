<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Warehouse Admin System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    h1 { font-size: 2.5rem; margin-bottom: 2rem; letter-spacing: 1px; }
    .cards { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
    .card {
      background: #2f2f2f;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 220px;
      text-align: center;
      text-decoration: none;
      color: #fff;
      font-size: 1.2rem;
      transition: transform 0.2s, background 0.2s;
    }
    .card:hover { transform: translateY(-6px); background: #444; }
    .card span { display: block; margin-top: 0.75rem; font-size: 0.9rem; color: #aaa; }
  </style>
</head>
<body>
  <h1>Warehouse Admin System</h1>
  <div class="cards">
    <a class="card" href="admin.html">Admin<span>Warehouse administration</span></a>
    <a class="card" href="manager.html">Manager<span>Shop &amp; inventory management</span></a>
    <a class="card" href="user.html">User<span>Add shops</span></a>
  </div>
</body>
</html>
